name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: cargo build · cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `cargo build` verifies the WGSL embeds and wgpu API contract still
      # compile. Bench runs need a real GPU and so are not exercised here.
      # `fmt --check` and `clippy --deny warnings` are intentionally not
      # gated yet — the existing benchmark code predates style enforcement.
      - run: cargo build --release
